<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Thoughts and aphorisms by Leon Zhou">
    <meta name="author" content="Leon Zhou">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; script-src 'self' 'unsafe-inline' https://www.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com;">

    <script src="../../assets/js/nav-dropdown.js"></script>
    <script src="../../assets/js/firebase-config.public.js"></script>
    <script type="module" src="../../assets/js/thoughts-filter.js"></script>
</head>
<body>
    <nav>
        <ul>
            <li><a href="../../"><img src="../../assets/images/content/lnzh.org.png" alt="home" class="size-5"></a></li>
        </ul>
        <img src="../../assets/images/ui/hr.png" alt="" class="nav-divider">
        <ul>
            <li class="dropdown-trigger">
                <img src="../../assets/images/ui/4star.png" alt="more" class="nav-dropdown-toggle">
            </li>
            <li class="dropdown-content">
                <ul class="dropdown-list">
                    <li class="dropdown-item"><a href="../../blog/"><img src="../../assets/images/content/blog0.png" alt="blog" class="size-4"></a></li>
                    <li class="dropdown-item"><a href="../../writing/" class="nav-temp-link">writing</a></li>
                    <li class="dropdown-item"><a href="../../list/"><img src="../../assets/images/content/list.png" alt="list" class="size-3"></a></li>
                    <li class="dropdown-item"><a href="../../about/"><img src="../../assets/images/content/about.png" alt="about" class="size-1"></a></li>
                    <li class="dropdown-item"><a href="../../time/"><img src="../../assets/images/content/time.svg" alt="time" class="size-2"></a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <main>
        <header class="intro">
            <h1>My most absurd thoughts</h1>
        </header>

        <a href="../../"><img src="../../assets/images/ui/3starbig.png" alt="" class="content-divider"></a>
        <p>moments of inspiration, varied in coherence, pulled from my notes and social media. press ★ to save!</p>
        <div class="thoughts-controls">
            <div class="thoughts-filters">
                <button id="all-btn" class="filter-btn active">All</button>
                <button id="random-btn" class="filter-btn">Random</button>
                <button id="favs-btn" class="filter-btn">★</button>
            </div>
            <span id="thought-count" class="thought-count"></span>
            <div class="thoughts-sort">
                <button id="reverse-order-btn" class="reverse-btn" title="Reverse order">
                    <img src="../../assets/images/ui/arrow0.png" alt="reverse order" id="reverse-arrow">
                </button>
                <select id="sort-select">
                    <option value="date">Date</option>
                    <option value="length">Length</option>
                    <option value="likes">Likes</option>
                </select>
                <input type="text" id="search-input" placeholder="Search..." />
            </div>
        </div>

        <section class="content thoughts-container" aria-live="polite"></section>
    </main>

    <footer class="footer">
        <div class="footer-icons">
            <a href="https://www.chess.com/member/leonzhou7" target="_blank" rel="noopener noreferrer"><img src="../../assets/images/icons/chess.png" alt="Chess.com"></a>
            <a href="mailto:crowded@gmail.com"><img src="../../assets/images/icons/gmail.png" alt="Email"></a>
            <a href="https://www.instagram.com/lnzh07/" target="_blank" rel="noopener noreferrer"><img src="../../assets/images/icons/instagram.png" alt="Instagram"></a>
            <a href="https://www.linkedin.com/in/leon-zhou-66b7182b0/" target="_blank" rel="noopener noreferrer"><img src="../../assets/images/icons/linkedin.png" alt="LinkedIn"></a>
            <a href="https://getxd.app/" target="_blank" rel="noopener noreferrer"><img src="../../assets/images/icons/XD.png" alt="XD"></a>
            <a href="https://www.yelp.com/user_details?userid=VF0qY_FihoZUKrObEiy__g" target="_blank" rel="noopener noreferrer"><img src="../../assets/images/icons/yelp.png" alt="Yelp"></a>
        </div>
    </footer>
</body>
</html>
