<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A sentence-by-sentence writing tool by Leon Zhou">
    <meta name="author" content="Leon Zhou">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; script-src 'self';">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>lnzhWriting</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="icon" type="image/png" href="../assets/images/content/favicon.png">
    <script src="../assets/js/nav-dropdown.js"></script>
    <script src="../assets/js/writing-tool.js" defer></script>
</head>
<body>
    <nav>
        <ul>
            <li><a href="../"><img src="../assets/images/content/lnzh.org.png" alt="home" class="size-5"></a></li>
        </ul>
        <img src="../assets/images/ui/hr.png" alt="" class="nav-divider">
        <ul>
            <li class="dropdown-trigger">
                <img src="../assets/images/ui/4star.png" alt="more" class="nav-dropdown-toggle">
            </li>
            <li class="dropdown-content" style="display: none;">
                <ul class="dropdown-list">
                    <li class="dropdown-item"><a href="../blog/"><img src="../assets/images/content/blog0.png" alt="blog" class="size-4"></a></li>
                    <li class="dropdown-item"><a href="../writing/" class="nav-temp-link">writing</a></li>
                    <li class="dropdown-item"><a href="../list/"><img src="../assets/images/content/list.png" alt="list" class="size-3"></a></li>
                    <li class="dropdown-item"><a href="../about/"><img src="../assets/images/content/about.png" alt="about" class="size-1"></a></li>
                    <li class="dropdown-item"><a href="../time/"><img src="../assets/images/content/time.svg" alt="time" class="size-2"></a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <main>
        <header class="intro">
            <h1>Writing</h1>
        </header>

        <a href="../"><img src="../assets/images/ui/3starbig.png" alt="" class="content-divider"></a>

        <section class="content writing-tool" aria-live="polite">
            <div class="writing-page">
                <form class="writing-editor" id="writing-editor">
                    <div class="sentence-stream" id="sentence-stream" aria-label="Sentence editor">
                        <span id="sentence-input" class="sentence-input-inline" contenteditable="true" role="textbox" aria-label="Sentence textbox" data-placeholder="Write. End a sentence with punctuation."></span>
                    </div>
                    <div class="sentence-keep-popover" id="sentence-keep-popover" hidden>
                        <span>accept?</span>
                        <button type="button" id="sentence-accept" aria-label="Accept sentence">✓</button>
                        <button type="button" id="sentence-reject" aria-label="Reject sentence">×</button>
                    </div>
                    <div class="writing-actions">
                        <button class="filter-btn" type="submit">complete draft</button>
                        <button class="filter-btn" type="button" id="toggle-blackout" disabled>blackout</button>
                        <button class="filter-btn" type="button" id="copy-writing" disabled>copy</button>
                    </div>
                    <p class="writing-note">Sentences are only kept when toggled on. Complete draft stores the current kept text below.</p>
                </form>
                <section class="completed-drafts" id="completed-drafts" aria-live="polite" hidden>
                    <h2>completed drafts</h2>
                    <div id="draft-list"></div>
                </section>
            </div>
            <div class="writing-toast" id="writing-toast" role="status" aria-live="polite"></div>
        </section>
    </main>

    <footer>
        <div class="footer-icons">
            <a href="https://www.chess.com/member/leonzhou7" target="_blank" rel="noopener noreferrer"><img src="../assets/images/icons/chess.png" alt="Chess.com"></a>
            <a href="mailto:crowded@gmail.com"><img src="../assets/images/icons/gmail.png" alt="Email"></a>
            <a href="https://www.instagram.com/lnzh07/" target="_blank" rel="noopener noreferrer"><img src="../assets/images/icons/instagram.png" alt="Instagram"></a>
            <a href="https://www.linkedin.com/in/leon-zhou-66b7182b0/" target="_blank" rel="noopener noreferrer"><img src="../assets/images/icons/linkedin.png" alt="LinkedIn"></a>
            <a href="https://getxd.app/" target="_blank" rel="noopener noreferrer"><img src="../assets/images/icons/XD.png" alt="XD"></a>
            <a href="https://www.yelp.com/user_details?userid=VF0qY_FihoZUKrObEiy__g" target="_blank" rel="noopener noreferrer"><img src="../assets/images/icons/yelp.png" alt="Yelp"></a>
        </div>
    </footer>
</body>
</html>
