    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; script-src 'self';">

    <script src="../../assets/js/sentence-lock-editor.js"></script>
</head>
<body>
    <nav>
        <ul>
            <li><a href="../../"><img src="../../assets/images/content/lnzh.org.png" alt="home" class="size-5"></a></li>
        </ul>
        <img src="../../assets/images/ui/hr.png" alt="" class="nav-divider">
        <ul>
            <li class="dropdown-trigger">
                <img src="../../assets/images/ui/4star.png" alt="more" class="nav-dropdown-toggle">
            </li>
            <li class="dropdown-content" style="display: none;">
                <ul class="dropdown-list">
                    <li class="dropdown-item"><a href="../../blog/"><img src="../../assets/images/content/blog0.png" alt="blog" class="size-4"></a></li>

                    <li class="dropdown-item"><a href="../../coffee/"><img src="../../assets/images/content/coffee.png" alt="coffee" class="size-3"></a></li>
                    <li class="dropdown-item"><a href="../../thoughts/"><img src="../../assets/images/content/thoughts.png" alt="thoughts and aphorisms" class="size-4"></a></li>
                    <li class="dropdown-item"><a href="../../list/"><img src="../../assets/images/content/list.png" alt="list" class="size-3"></a></li>
                    <li class="dropdown-item"><a href="../../about/"><img src="../../assets/images/content/about.png" alt="about" class="size-1"></a></li>
                    <li class="dropdown-item"><a href="../../now/"><img src="../../assets/images/content/now.png" alt="now" class="size-0"></a></li>
                    <li class="dropdown-item"><a href="../../next/"><img src="../../assets/images/content/next.png" alt="next" class="size-1"></a></li>
                    <li class="dropdown-item"><a href="../../why/"><img src="../../assets/images/content/why_.png" alt="why" class="size-4"></a></li>
                    <li class="dropdown-item"><a href="../../ai/"><img src="../../assets/images/content/AI.png" alt="ai" class="size-2"></a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <main>
        <header class="intro">
            <h1>Sentence lock</h1>
        </header>

        <a href="../../blog/"><img src="../../assets/images/ui/3starbig.png" alt="" class="content-divider"></a>

        <section class="content sentence-lock-tool" aria-labelledby="sentence-lock-heading">
            <h2 id="sentence-lock-heading">write forward</h2>
            <div class="sentence-lock-controls" aria-label="settings">
                <label class="sentence-lock-toggle">
                    <input type="checkbox" id="show-locked-toggle" checked>
                    <span>show locked sentences</span>
                </label>
                <label class="sentence-lock-toggle">
                    <input type="checkbox" id="confirm-lock-toggle">
                    <span>confirm sentence completion</span>
                </label>
            </div>

            <div class="sentence-editor" id="sentence-editor">
                <div class="locked-sentences" id="locked-sentences" aria-live="polite"></div>
                <textarea id="sentence-draft" rows="8" spellcheck="true" placeholder="Begin here. When a sentence ends, it leaves your hands."></textarea>
            </div>

            <div class="sentence-lock-actions">
                <button class="filter-btn" id="finish-session-btn" type="button">Complete session</button>
                <button class="filter-btn" id="copy-session-btn" type="button">Copy text</button>
                <button class="filter-btn" id="new-session-btn" type="button">New session</button>
                <span class="thought-count" id="sentence-status" aria-live="polite">0 locked</span>
            </div>
        </section>
    </main>

    <footer>

            <a href="https://getxd.app/" target="_blank" rel="noopener noreferrer"><img src="../../assets/images/icons/XD.png" alt="XD"></a>
            <a href="https://www.yelp.com/user_details?userid=VF0qY_FihoZUKrObEiy__g" target="_blank" rel="noopener noreferrer"><img src="../../assets/images/icons/yelp.png" alt="Yelp"></a>
        </div>
    </footer>
</body>
